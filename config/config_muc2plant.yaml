# Configuration file for the muc2plant snakemake pipeline
# Edit this file with your system-specific paths and settings

# Project settings
project_name: "XXXX_muc2plant"  # Change to your project name

# Input/Output directories
input_dir: "fastq_files"
sample_sheet: "sample_sheet.txt"

# Database paths - EDIT THESE FOR YOUR SYSTEM
# Path to databases dbcan uses
databases:
  dbcan_db: "db"
  human_genome: "path/to/human/genome"

# Conda environment paths, best to keep this in path/to/project/root
conda_envs:
  megahit: "envs/megahit.yaml"
  pyrodigal: "envs/pyrodigal.yaml"
  rundbcan: "envs/rundbcan.yaml"
  samtools: "envs/samtools.yaml"
  bwa: "envs/bwa.yaml"
  dbcan_utils: "envs/dbcan_utils.yaml"
  fastqc_multiqc: "envs/fastqc_multiqc.yaml"
  bowtie: "envs/bowtie.yaml"
  fastp: "envs/fastp.yaml"
  dbcan: "envs/cazyme_annotation.yaml"


# Resource allocation (memory in GB, runtime in minutes)
resources:
  megahit:
    threads: 32
    mem_gb: 128
    runtime_min: 960
    
  pyrodigal:
    threads: 4
    mem_gb: 36
    runtime_min: 480
    
  rundbcan:
    threads: 32
    mem_gb: 128
    runtime_min: 960
    
  samtools:
    threads: 8
    mem_gb: 32
    runtime_min: 240
    
  bwa:
    threads: 24
    mem_gb: 128
    runtime_min: 480
    
  dbcan_utils:
    threads: 4
    mem_gb: 36
    runtime_min: 480

  fastqc:
    threads: 4
    mem_gb: 16
    runtime_min: 240

  bowtie2:
    threads: 8
    mem_gb: 64
    runtime_min: 1440  # 24 hours

  fastp_trim:
    threads: 4
    mem_gb: 16
    runtime_min: 360  # 6 hours

  fastp_merge:
    threads: 4
    mem_gb: 16
    runtime_min: 360  # 6 hours

# Quality filtering parameters for fastp
fastp_params:
  trim:
    min_length: 99
    quality_phred: 30
  merge:
    overlap_len_require: 10
    overlap_diff_percent_limit: 10
